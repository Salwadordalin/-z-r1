<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Senin İçin...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://use.typekit.net/trt3ngp.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Dancing+Script:wght@600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #0a0005; } /* Arka planı daha koyu yaptım ki parıltı çıksın */
    body { -webkit-font-smoothing: antialiased; color: #ffdada; }
    .h1text { font-family: "Lilita One", sans-serif; font-weight: 100; font-size: 2rem; position: absolute; top: 5vh; width: 100%; text-align: center; z-index: 10; letter-spacing: 3px; color: #ff89aC; text-shadow: 0 0 10px rgba(255, 137, 172, 0.5); }
    .webgl { position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; outline: none; }
    body::before { content: ""; position: absolute; border: 4px solid #ff89aC; inset: 1rem; z-index: 100; pointer-events: none; opacity: 0.3; }
    
    .message-container {
      position: absolute;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 450px;
      background: rgba(10, 0, 5, 0.7);
      backdrop-filter: blur(12px);
      padding: 1.5rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 137, 172, 0.4);
      text-align: center;
      z-index: 105;
      opacity: 0;
      transition: opacity 2.5s ease;
      box-shadow: 0 0 30px rgba(255, 137, 172, 0.2);
    }
    .message-container h2 { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #ffb3c6; margin-bottom: 0.5rem; }
    .message-container p { font-family: sans-serif; font-size: 1rem; line-height: 1.6; color: #ffe5ec; font-weight: 300; }

    button { position: absolute; inset: 0; margin: auto; height: 12vh; width: 12vh; background: transparent; border: 2px solid #ff89aC; border-radius: 50%; cursor: pointer; z-index: 110; transition: all 0.4s; box-shadow: 0 0 15px rgba(255, 137, 172, 0.3); }
    button:hover { transform: scale(1.1); background: rgba(255, 137, 172, 0.1); }
    svg { width: 4vh; color: #ff89aC; }
  </style>
</head>
<body>

  <canvas class="webgl"></canvas>
  <h1 class="h1text">THIS IS FOR YOU</h1>
  
  <div class="message-container" id="apologyNote">
    <h2>Özür Dilerim...</h2>
    <p>Yaşanan her şey için çok pişmanım. Kalbini kırdığım her anın yükünü taşıyorum. Lütfen bu parlayan kristaller gibi saf ve gerçek sevgimize bir şans daha ver. Seni çok seviyorum.</p>
  </div>

  <button id="play-music" type="button">
    <svg fill="currentColor" viewBox="0 0 512 512"><path d="M470.38 1.51L150.41 96A32 32 0 0 0 128 126.51v261.41A139 139 0 0 0 96 384c-53 0-96 28.66-96 64s43 64 96 64 96-28.66 96-64V214.32l256-75v184.61a138.4 138.4 0 0 0-32-3.93c-53 0-96 28.66-96 64s43 64 96 64 96-28.65 96-64V32a32 32 0 0 0-41.62-30.49z"/></svg>
  </button>

  <script type="x-shader/x-vertex" id="vertexShader">
    #define M_PI 3.14159265358979323846
    uniform float uTime; uniform float uSize; attribute float aScale; attribute vec3 aColor; attribute float random; attribute float aSpeed; varying vec3 vColor;
    void main() {
      float sign = 2.0 * (step(random, 0.5) - 0.5);
      float t = sign * mod(-uTime * aSpeed * 0.005 + 10.0 * aSpeed * aSpeed, M_PI);
      float a = pow(t, 2.0) * pow((t - sign * M_PI), 2.0);
      float radius = 0.15;
      vec3 myOffset = vec3(
        radius * 16.0 * pow(sin(t), 3.0),
        radius * (13.0 * cos(t) - 5.0 * cos(2.0 * t) - 2.0 * cos(3.0 * t) - cos(4.0 * t)),
        0.15 * a * (random - 0.5)
      );
      vec4 modelPosition = modelMatrix * vec4(myOffset, 1.0);
      vec4 viewPosition = viewMatrix * modelPosition;
      viewPosition.xyz += position * aScale * uSize * pow(a, 0.5) * 1.2;
      gl_Position = projectionMatrix * viewPosition;
      vColor = aColor;
    }
  </script>

  <script type="x-shader/x-fragment" id="fragmentShader">
    varying vec3 vColor;
    void main() {
      float strength = 1.0 - (distance(gl_PointCoord, vec2(0.5)) * 2.0); // Noktasal parıltı
      strength = pow(strength, 3.0);
      gl_FragColor = vec4(vColor, strength);
    }
  </script>

  <script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.135.0";
    import { gsap } from "https://cdn.skypack.dev/gsap@3.8.0";
    import { GLTFLoader } from "https://cdn.skypack.dev/three@0.135.0/examples/jsm/loaders/GLTFLoader";

    class World {
      constructor({ canvas }) {
        this.scene = new THREE.Scene();
        this.clock = new THREE.Clock();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        this.camera.position.z = 4.5;
        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.data = 0;
        
        this.init();
      }

      async init() {
        this.addHeart();
        this.addModel();
        this.addEvents();
        this.loop();
      }

      addHeart() {
        this.heartMaterial = new THREE.ShaderMaterial({
          fragmentShader: `
            varying vec3 vColor;
            void main() {
              float d = distance(gl_PointCoord, vec2(0.5));
              float str = 0.05 / d - 0.1; // Parlama efekti
              gl_FragColor = vec4(vColor, str);
            }
          `,
          vertexShader: document.getElementById("vertexShader").textContent,
          uniforms: { uTime: { value: 0 }, uSize: { value: 0.4 } },
          transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const count = 2500; // Daha fazla parçacık
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const scales = new Float32Array(count);
        const colors = new Float32Array(count * 3);
        const randoms = new Float32Array(count);
        const speeds = new Float32Array(count);

        for (let i = 0; i < count; i++) {
          scales[i] = Math.random();
          randoms[i] = Math.random();
          speeds[i] = Math.random() * 40.0;
          const color = new THREE.Color(["#ff0055", "#ff89aC", "#ffffff", "#ff1144"][Math.floor(Math.random() * 4)]);
          colors[i*3] = color.r; colors[i*3+1] = color.g; colors[i*3+2] = color.b;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
        geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
        geo.setAttribute('random', new THREE.BufferAttribute(randoms, 1));
        geo.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));

        this.points = new THREE.Points(geo, this.heartMaterial);
        this.scene.add(this.points);
      }

      addModel() {
        const loader = new GLTFLoader();
        loader.load("https://assets.codepen.io/74321/heart.glb", (gltf) => {
          this.model = gltf.scene.children[0];
          this.model.scale.set(0.35, 0.35, 0.35);
          this.model.material = new THREE.MeshPhongMaterial({ color: "#ff2266", emissive: "#ff0044", shininess: 100 });
          this.scene.add(this.model);
          
          const light = new THREE.PointLight(0xffffff, 1, 10);
          light.position.set(0, 0, 2);
          this.scene.add(light);
        });
      }

      addEvents() {
        const btn = document.querySelector("button");
        btn.addEventListener("click", () => {
          gsap.to(btn, { opacity: 0, duration: 1, onComplete: () => btn.style.display = "none" });
          document.getElementById("apologyNote").style.opacity = "1";
          this.startMusic();
        });
        window.addEventListener("resize", () => {
          this.camera.aspect = window.innerWidth / window.innerHeight;
          this.camera.updateProjectionMatrix();
          this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      startMusic() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        this.sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load("https://assets.codepen.io/74321/ukulele.mp3", (buffer) => {
          this.sound.setBuffer(buffer);
          this.sound.setLoop(true);
          this.sound.play();
          this.analyser = new THREE.AudioAnalyser(this.sound, 32);
        });
      }

      loop() {
        const elapsed = this.clock.getElapsedTime();
        if (this.analyser) {
          this.data = this.analyser.getAverageFrequency() / 100;
          this.points.rotation.y += 0.01 + this.data * 0.05;
        }
        
        this.heartMaterial.uniforms.uTime.value = elapsed;
        if (this.model) {
            this.model.rotation.y += 0.005;
            this.model.scale.setScalar(0.35 + Math.sin(elapsed * 2) * 0.02 + this.data * 0.1);
        }

        this.renderer.render(this.scene, this.camera);
        requestAnimationFrame(this.loop.bind(this));
      }
    }

    new World({ canvas: document.querySelector(".webgl") });
  </script>
</body>
</html>
