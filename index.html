<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Bizim İçin... (Sonsuz Döngü)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://use.typekit.net/trt3ngp.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Dancing+Script:wght@600&family=Space+Mono&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #030002; } 
    body { -webkit-font-smoothing: antialiased; color: #ffdada; }

    .webgl { position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; outline: none; z-index: 1; }
    
    .h1text { 
      font-family: "Lilita One", sans-serif; 
      font-size: 1.8rem; 
      position: absolute; 
      top: 4vh; 
      width: 100%; 
      text-align: center; 
      z-index: 10; 
      letter-spacing: 5px;
      color: #ff89aC;
      text-shadow: 0 0 15px #ff89aC;
      opacity: 0.6;
    }

    .message-container {
      position: absolute;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 450px;
      background: rgba(10, 0, 5, 0.4);
      backdrop-filter: blur(20px);
      padding: 1.8rem;
      border-radius: 30px;
      border: 1px solid rgba(255, 137, 172, 0.2);
      text-align: center;
      z-index: 105;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .message-container h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      color: #ffb3c6;
      margin-bottom: 0.8rem;
    }

    #typewriter {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      color: #ffe5ec;
      line-height: 1.5;
    }

    /* Anı Baloncukları Stili */
    .memory-bubble {
      position: absolute;
      font-family: 'Dancing Script', cursive;
      color: #ff89aC;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 102;
      text-shadow: 0 0 10px rgba(255, 137, 172, 0.8);
      white-space: nowrap;
    }

    button { 
      position: absolute; 
      inset: 0; 
      margin: auto; 
      height: 10vh; 
      width: 10vh; 
      background: transparent; 
      border-radius: 50%;
      border: 2px solid #ff89aC; 
      cursor: pointer; 
      z-index: 110; 
      transition: 0.4s;
      box-shadow: 0 0 20px rgba(255, 137, 172, 0.2);
    }
    button:hover { transform: scale(1.1); box-shadow: 0 0 40px #ff89aC; }
    svg { width: 3.5vh; color: #ff89aC; }
  </style>
</head>
<body>

  <canvas class="webgl"></canvas>
  <h1 class="h1text">ETERNAL CRYSTAL</h1>

  <div class="message-container" id="note">
    <h2>Özür Dilerim...</h2>
    <p id="typewriter"></p>
  </div>

  <button id="start-btn" type="button">
    <svg fill="currentColor" viewBox="0 0 512 512"><path d="M470.38 1.51L150.41 96A32 32 0 0 0 128 126.51v261.41A139 139 0 0 0 96 384c-53 0-96 28.66-96 64s43 64 96 64 96-28.66 96-64V214.32l256-75v184.61a138.4 138.4 0 0 0-32-3.93c-53 0-96 28.66-96 64s43 64 96 64 96-28.65 96-64V32a32 32 0 0 0-41.62-30.49z"/></svg>
  </button>

  <script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.135.0";
    import { gsap } from "https://cdn.skypack.dev/gsap@3.8.0";
    import { GLTFLoader } from "https://cdn.skypack.dev/three@0.135.0/examples/jsm/loaders/GLTFLoader";
    import { EffectComposer } from "https://cdn.skypack.dev/three@0.135.0/examples/jsm/postprocessing/EffectComposer";
    import { RenderPass } from "https://cdn.skypack.dev/three@0.135.0/examples/jsm/postprocessing/RenderPass";
    import { UnrealBloomPass } from "https://cdn.skypack.dev/three@0.135.0/examples/jsm/postprocessing/UnrealBloomPass";

    const memories = ["Gülüşün", "Antalya", "İlk Günümüz", "Gözlerin", "Hayallerimiz", "Sonsuzluk", "Affet"];

    class World {
      constructor({ canvas }) {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x050003, 0.15); // Nebula/Sis Etkisi
        this.clock = new THREE.Clock();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        this.camera.position.z = 5;
        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        this.mouse = new THREE.Vector2();
        this.init();
      }

      async init() {
        this.addHeart();
        this.addModel();
        this.addPostProcessing();
        this.addEvents();
        this.loop();
      }

      addPostProcessing() {
        this.composer = new EffectComposer(this.renderer);
        this.composer.addPass(new RenderPass(this.scene, this.camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.8);
        this.composer.addPass(bloomPass);
      }

      addHeart() {
        this.heartMaterial = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uSize: { value: 0.5 }, uExplosion: { value: 0 } },
          vertexShader: `
            uniform float uTime; uniform float uSize; uniform float uExplosion;
            attribute float aScale; attribute vec3 aColor; attribute float aSpeed;
            varying vec3 vColor;
            void main() {
              float t = mod(uTime * aSpeed * 0.01, 6.28);
              vec3 pos = vec3(16.0*pow(sin(t),3.0), (13.0*cos(t)-5.0*cos(2.0*t)-2.0*cos(3.0*t)-cos(4.0*t)), 0.0);
              pos *= (0.15 + uExplosion); // Patlama Etkisi
              vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
              gl_PointSize = aScale * uSize * (100.0 / -mvPosition.z);
              gl_Position = projectionMatrix * mvPosition;
              vColor = aColor;
            }
          `,
          fragmentShader: `
            varying vec3 vColor;
            void main() {
              if(length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
              gl_FragColor = vec4(vColor, 1.0);
            }
          `,
          transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const geo = new THREE.BufferGeometry();
        const count = 4000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const scales = new Float32Array(count);
        const speeds = new Float32Array(count);

        for(let i=0; i<count; i++) {
          scales[i] = Math.random() * 2;
          speeds[i] = 10 + Math.random() * 30;
          const col = new THREE.Color(["#ff0055", "#ff89aC", "#ffffff"][Math.floor(Math.random()*3)]);
          colors[i*3]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
        geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
        geo.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));

        this.points = new THREE.Points(geo, this.heartMaterial);
        this.scene.add(this.points);
      }

      addModel() {
        const loader = new GLTFLoader();
        loader.load("https://assets.codepen.io/74321/heart.glb", (gltf) => {
          this.model = gltf.scene.children[0];
          this.model.scale.set(0.35, 0.35, 0.35);
          this.model.material = new THREE.MeshStandardMaterial({ color: "#ff2266", emissive: "#ff0044" });
          this.scene.add(this.model);
        });
      }

      spawnMemory() {
        const word = memories[Math.floor(Math.random() * memories.length)];
        const el = document.createElement("div");
        el.className = "memory-bubble";
        el.textContent = word;
        el.style.left = Math.random() * 80 + 10 + "%";
        el.style.top = Math.random() * 60 + 20 + "%";
        document.body.appendChild(el);
        
        gsap.to(el, { 
          y: -100, opacity: 0, duration: 4, 
          onComplete: () => el.remove() 
        });
      }

      explode() {
        gsap.to(this.heartMaterial.uniforms.uExplosion, { value: 5, duration: 1, yoyo: true, repeat: 1, ease: "power2.inOut" });
      }

      addEvents() {
        const btn = document.getElementById("start-btn");
        btn.addEventListener("click", () => {
          gsap.to(btn, { opacity: 0, scale: 0, duration: 1 });
          document.getElementById("note").style.opacity = "1";
          this.startMusic();
          this.typeWriter();
          this.explode();
          setInterval(() => this.spawnMemory(), 2500);
        });

        window.addEventListener("mousemove", (e) => {
          this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
          this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
          gsap.to(this.camera.position, { x: this.mouse.x * 0.5, y: this.mouse.y * 0.5, duration: 1 });
        });
      }

      startMusic() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load("https://assets.codepen.io/74321/ukulele.mp3", (buffer) => {
          sound.setBuffer(buffer);
          sound.play();
          this.analyser = new THREE.AudioAnalyser(sound, 32);
        });
      }

      typeWriter() {
        const text = "Her parçacık sana olan sevgimin bir kanıtı. Kalbini kırdığım için çok pişmanım, her şeyi onarmak için buradayım. Lütfen bize bir şans daha ver...";
        let i = 0;
        const el = document.getElementById("typewriter");
        const interval = setInterval(() => {
          el.textContent += text[i];
          i++;
          if(i === text.length) clearInterval(interval);
        }, 60);
      }

      loop() {
        const elapsed = this.clock.getElapsedTime();
        this.heartMaterial.uniforms.uTime.value = elapsed;
        
        // Kalp Atışı (Pulse)
        const pulse = Math.sin(elapsed * 4) * 0.05;
        if(this.model) this.model.scale.setScalar(0.35 + pulse);

        if(this.analyser) {
          const freq = this.analyser.getAverageFrequency() / 100;
          this.points.rotation.y += 0.01 + freq * 0.05;
        }

        this.composer.render();
        requestAnimationFrame(this.loop.bind(this));
      }
    }

    new World({ canvas: document.querySelector(".webgl") });
  </script>
</body>
</html>
